spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/lunero_dev
    username: lunero
    password: lunero
    driver-class-name: org.postgresql.Driver

  jpa:
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  flyway:
    baseline-on-migrate: true

logging:
  level:
    com.lunero: DEBUG
    org.springframework.security: INFO
    org.flywaydb: DEBUG

# VAPID keys for local dev — generate with: npx web-push generate-vapid-keys
# Override via environment variables in production
vapid:
  public-key: ${VAPID_PUBLIC_KEY:placeholder-public-key}
  private-key: ${VAPID_PRIVATE_KEY:placeholder-private-key}
  subject: ${VAPID_SUBJECT:mailto:dev@lunero.app}
